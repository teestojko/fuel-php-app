; PHP自体のバージョン情報をレスポンスへ公開しません。
expose_php = Off
; エラー詳細はブラウザへ出さず、コンテナログで確認します。
display_errors = Off
log_errors = On
error_reporting = E_ALL
; リクエストによる過剰なリソース消費を制限します。
memory_limit = 256M
max_execution_time = 30
post_max_size = 8M
upload_max_filesize = 8M
max_input_vars = 1000
; セッションCookieの基本的な保護を有効にします。
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
; 本番でも利用するOPcacheを有効にします。
opcache.enable = 1
opcache.validate_timestamps = 1
