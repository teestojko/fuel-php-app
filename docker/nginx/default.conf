server {
    listen 80;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'" always;
    client_max_body_size 8m;

    root /var/www/frontend/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # APIリクエストだけをFuelPHPへ渡します。
    location /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass api:9000;
        fastcgi_read_timeout 30s;
    }

    # PHPファイル、隠しファイル、設定ファイルを直接公開しません。
    location ~ \.php$ { return 404; }
    location ~ /\. { deny all; }
}
