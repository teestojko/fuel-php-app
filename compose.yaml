name: fuel-api-app

services:
  web:
    image: nginx:1.28-alpine
    ports:
      # 開発用Webサーバーをローカル端末からだけ公開します。
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./frontend:/var/www/frontend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks: [edge, internal]
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    # 通常は.envを使い、構文検証時だけ安全な例示ファイルへ切り替えられます。
    env_file: ["${APP_ENV_FILE:-.env}"]
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      database:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  database:
    platform: linux/amd64
    image: mysql:8.4
    environment:
      # 各値はGit管理外の.envからコンテナへ渡します。
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - database_data:/var/lib/mysql
    networks: [internal]
    healthcheck:
      # パスワードを表示せず、MySQLの稼働だけを確認します。
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  frontend:
    image: node:24-alpine
    working_dir: /workspace
    environment:
      # 開発サーバーがAPIへ転送するコンテナ内部URLです。
      API_PROXY_TARGET: http://web
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/workspace
      - frontend_modules:/workspace/node_modules
    command: sh -c "npm ci && npm run dev"
    depends_on: [web]
    networks: [edge]
    security_opt: [no-new-privileges:true]

networks:
  edge:
  internal:
    internal: true

volumes:
  database_data:
  frontend_modules:
